<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Frank Creations LLC social preview</title>
  <desc id="desc">A wide social sharing graphic for Frank Creations LLC featuring the umbrella brand and offerings.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="55%" stop-color="#f4e7d6"/>
      <stop offset="100%" stop-color="#ead6c2"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#b85c38"/>
      <stop offset="100%" stop-color="#d28b62"/>
    </linearGradient>
    <linearGradient id="accentCool" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1d6b63"/>
      <stop offset="100%" stop-color="#58a196"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="120" r="140" fill="#ffffff" opacity=".45"/>
  <circle cx="180" cy="520" r="180" fill="#ffffff" opacity=".32"/>
  <path d="M145 455c92-180 245-285 424-317-29 98-30 208-1 331-161 64-303 57-423-14Z" fill="url(#accentWarm)"/>
  <path d="M280 150c115 16 222 84 315 209-129-14-240 21-323 104-46-116-44-220 8-313Z" fill="url(#accentCool)" opacity=".95"/>
  <g fill="#1e1a16">
    <text x="610" y="230" font-family="Manrope, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="6">FRANK CREATIONS LLC</text>
    <text x="610" y="312" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700">Creative events,</text>
    <text x="610" y="390" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700">music, and family</text>
    <text x="610" y="468" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700">experiences</text>
    <text x="610" y="536" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="600" fill="#655b53">Wine &amp; Canvas Toledo • A Change Of Plans • Cookies &amp; Canvas</text>
  </g>
