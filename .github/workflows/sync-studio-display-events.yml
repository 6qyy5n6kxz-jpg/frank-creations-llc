name: Sync Studio Display Events

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  sync-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh studio display event snapshot
        run: python3 scripts/sync-studio-display-events.py

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/studio-display-events.json; then
            echo "No studio-display event changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/studio-display-events.json
          git commit -m "Sync studio-display events"
          git push
